<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社交资产多租户审计控制台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f4f6;
      --panel: #ffffff;
      --line: #e5e7eb;
      --muted: #64748b;
      --text: #1f2937;
      --ink: #0f172a;
      --accent: #059669;
      --accent-soft: #d1fae5;
      --danger: #dc2626;
      --warn: #d97706;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 14px;
    }
    button, input, select, textarea { font: inherit; }
    button {
      cursor: pointer;
      border: 0;
      background: transparent;
      color: inherit;
    }
    button:disabled { cursor: not-allowed; opacity: .5; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 9px;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(5, 150, 105, .14);
    }
    textarea { resize: vertical; min-height: 80px; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }
    .app { display: flex; width: 100vw; height: 100vh; overflow: hidden; }
    .rail {
      width: 84px;
      flex: 0 0 84px;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 22px 10px;
    }
    .brand { font-weight: 800; font-size: 12px; letter-spacing: .08em; margin-bottom: 22px; }
    .account-stack { display: flex; flex-direction: column; gap: 14px; align-items: center; width: 100%; }
    .avatar-button {
      position: relative;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      padding: 2px;
      opacity: .72;
    }
    .avatar-button.active { opacity: 1; outline: 2px solid #34d399; }
    .avatar, .room-avatar {
      position: relative;
      width: 100%;
      height: 100%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
      user-select: none;
    }
    .avatar img, .room-avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .avatar { border-radius: 999px; }
    .room-avatar { border-radius: 10px; }
    .status-dot {
      position: absolute;
      right: 1px;
      bottom: 1px;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 2px solid #0f172a;
      background: #94a3b8;
    }
    .status-green { background: #34d399; }
    .status-red { background: #f87171; }
    .status-gray { background: #94a3b8; }
    .rail-footer {
      width: 100%;
      color: #94a3b8;
      text-align: center;
      font-size: 12px;
      display: grid;
      gap: 10px;
    }
    .rail-footer button:hover { color: #fff; }
    .sidebar {
      width: 390px;
      flex: 0 0 390px;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .side-head, .settings, .search-box {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }
    .side-head h1 {
      margin: 0 0 6px;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
    }
    .hint { color: var(--muted); font-size: 12px; }
    .search-row { display: flex; gap: 8px; margin-top: 12px; }
    .search-row input { flex: 1; }
    .rooms, .search-results, .adapter-list, .chat-scroll { overflow: auto; }
    .rooms { flex: 1; }
    .settings { display: none; background: #fff; }
    .settings.open { display: block; }
    .settings-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .form-grid { display: grid; gap: 8px; }
    .button-row { display: flex; gap: 8px; }
    .btn {
      min-height: 34px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 7px 12px;
      white-space: nowrap;
    }
    .btn:hover { background: #f8fafc; }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn.primary:hover { background: #047857; }
    .btn.link {
      border: 0;
      padding: 0;
      min-height: auto;
      color: var(--accent);
      background: transparent;
    }
    .btn.danger { color: var(--danger); }
    .adapter-list {
      margin-top: 10px;
      max-height: 180px;
      display: grid;
      gap: 6px;
    }
    .adapter-item, .room-item, .result-item {
      width: 100%;
      text-align: left;
      border-top: 1px solid var(--line);
      padding: 12px 16px;
      background: #fff;
    }
    .adapter-item {
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px 8px;
      font-size: 12px;
    }
    .room-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .room-item:hover, .result-item:hover { background: #f8fafc; }
    .room-item.active { background: #f1f5f9; }
    .room-thumb { width: 42px; height: 42px; flex: 0 0 42px; }
    .truncate {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .room-meta, .result-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .empty, .loading {
      color: var(--muted);
      padding: 18px 16px;
    }
    .search-box { display: none; background: #f8fafc; max-height: 45%; overflow: hidden; }
    .search-box.open { display: flex; flex-direction: column; }
    .search-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .main {
      min-width: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
    }
    .topbar {
      height: 58px;
      flex: 0 0 58px;
      background: #fff;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
    }
    .top-actions { display: flex; gap: 8px; align-items: center; }
    .chat-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .chat-scroll {
      flex: 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
    }
    .message.mine {
      flex-direction: row-reverse;
    }
    .message-avatar { width: 40px; height: 40px; flex: 0 0 40px; }
    .message-body {
      max-width: 68%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 0;
    }
    .message.mine .message-body { align-items: flex-end; }
    .message-meta {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }
    .bubble {
      background: #fff;
      border-radius: 8px;
      border-top-left-radius: 2px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .08);
      padding: 10px 12px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.mine .bubble {
      background: var(--accent);
      color: #fff;
      border-top-left-radius: 8px;
      border-top-right-radius: 2px;
    }
    .media-image-button {
      border: 0;
      padding: 0;
      background: transparent;
      display: block;
      cursor: zoom-in;
    }
    .media-img { max-width: min(340px, 100%); border-radius: 6px; display: block; }
    .media-video { max-width: min(420px, 100%); border-radius: 6px; display: block; }
    .json-card {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      max-width: 360px;
      white-space: normal;
    }
    .json-card-img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 6px;
      background: #e2e8f0;
    }
    .json-card-body { min-width: 0; }
    .json-card-title {
      display: block;
      color: inherit;
      font-weight: 700;
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .json-card-desc {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-top: 4px;
    }
    .cq-parts { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; white-space: normal; }
    .cq-text { white-space: pre-wrap; }
    .reply-card {
      width: 100%;
      border-left: 3px solid #94a3b8;
      background: #f1f5f9;
      color: #475569;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.45;
    }
    .cq-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #334155;
      font-size: 12px;
      font-weight: 700;
    }
    .forward-card {
      width: min(360px, 100%);
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: #0f172a;
    }
    .forward-card button { width: 100%; justify-content: flex-start; }
    .forward-detail {
      margin-top: 8px;
      display: grid;
      gap: 6px;
      max-height: 360px;
      overflow: auto;
    }
    .forward-message {
      border-top: 1px solid #e2e8f0;
      padding-top: 6px;
      font-size: 13px;
    }
    .forward-meta { color: var(--muted); font-size: 11px; margin-bottom: 2px; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, .46);
      padding: 24px;
      z-index: 20;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(680px, 100%);
      max-height: min(760px, 92vh);
      background: #fff;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .25);
    }
    .modal-header, .modal-footer {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .modal-footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
    }
    .modal-body {
      padding: 18px;
      overflow: auto;
      display: grid;
      gap: 12px;
    }
    .image-preview-backdrop {
      z-index: 30;
      background: rgba(15, 23, 42, .78);
    }
    .image-preview {
      position: relative;
      width: min(960px, 100%);
      max-height: 92vh;
      display: grid;
      gap: 10px;
      justify-items: center;
    }
    .image-preview img {
      max-width: 100%;
      max-height: 82vh;
      border-radius: 8px;
      object-fit: contain;
      background: #0f172a;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .35);
    }
    .image-preview-close {
      justify-self: end;
      background: #fff;
    }
    .image-preview-caption {
      max-width: 100%;
      color: #e2e8f0;
      font-size: 12px;
      text-align: center;
      word-break: break-all;
    }
    .report {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8fafc;
      padding: 12px;
      font-size: 12px;
      display: grid;
      gap: 5px;
    }
    .ok { color: var(--accent); }
    .bad { color: var(--danger); }
    .grid-two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .label { display: grid; gap: 5px; font-size: 12px; color: var(--muted); }
    @media (max-width: 860px) {
      .rail { width: 72px; flex-basis: 72px; }
      .sidebar { width: 320px; flex-basis: 320px; }
      .topbar { padding: 0 14px; }
      .top-actions { gap: 6px; }
      .btn { padding: 7px 9px; }
      .message-body { max-width: 82%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="rail">
      <div>
        <div class="brand">AUDIT V4</div>
        <div id="accountList" class="account-stack"></div>
      </div>
      <div class="rail-footer">
        <button id="settingsToggle">账号设置</button>
        <div><span id="accountCount">0</span> 账号</div>
      </div>
    </aside>

    <section class="sidebar">
      <div class="side-head">
        <h1>多租户社交资产审计</h1>
        <div class="hint">状态枚举：green/red/gray</div>
        <div class="search-row">
          <input id="searchInput" placeholder="全局搜索当前机器人视角消息..." />
          <button id="searchButton" class="btn primary">搜索</button>
        </div>
      </div>

      <div id="settingsPanel" class="settings">
        <div class="settings-title">
          <span>账号设置</span>
          <button id="newAdapterButton" class="btn link">新增账号</button>
        </div>
        <div class="form-grid">
          <input id="adapterId" placeholder="机器人账号 / self_id" />
          <select id="adapterPlatform">
            <option value="qq">qq</option>
            <option value="wechat">wechat</option>
          </select>
          <select id="adapterStatus">
            <option value="gray">gray</option>
            <option value="green">green</option>
            <option value="red">red</option>
          </select>
          <textarea id="adapterConfig" placeholder='配置 JSON，例如 {"token":"..."}'></textarea>
          <div class="button-row">
            <button id="saveAdapterButton" class="btn primary">添加账号</button>
            <button id="clearAdapterButton" class="btn">清空</button>
          </div>
        </div>
        <div id="adapterList" class="adapter-list"></div>
      </div>

      <div id="searchPanel" class="search-box">
        <div class="search-head">
          <span>搜索结果 · <span id="searchResultCount">0</span></span>
          <button id="clearSearchButton" class="btn link">返回会话</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </div>

      <div id="roomList" class="rooms"></div>
    </section>

    <main class="main">
      <header class="topbar">
        <div>
          <strong id="roomTitle">请选择会话</strong>
          <span id="robotView" class="hint"></span>
        </div>
        <div class="top-actions">
          <button id="refreshButton" class="btn">刷新</button>
          <button id="openImportButton" class="btn">导入 JSON</button>
          <button id="openExportButton" class="btn primary">高级过滤导出</button>
        </div>
      </header>
      <div id="chatEmpty" class="chat-empty">从左侧选择一个机器人账号和会话，开始审计聊天资产。</div>
      <div id="chatWindow" class="chat-scroll" hidden></div>
    </main>
  </div>

  <div id="importModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <strong>导入 JSON</strong>
        <button class="btn" data-close-modal="importModal">关闭</button>
      </div>
      <div class="modal-body">
        <textarea id="importPackageText" placeholder="粘贴 /api/export 导出的 JSON 包" style="min-height: 230px;"></textarea>
        <div id="importValidationReport" class="report" hidden></div>
      </div>
      <div class="modal-footer">
        <button class="btn" data-close-modal="importModal">取消</button>
        <button id="validateImportButton" class="btn">校验</button>
        <button id="submitImportButton" class="btn primary">确认导入</button>
      </div>
    </div>
  </div>

  <div id="exportModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <strong>高级过滤导出</strong>
        <button class="btn" data-close-modal="exportModal">关闭</button>
      </div>
      <div class="modal-body">
        <label class="label">机器人视角 robot_id<input id="exportRobotId" placeholder="robot_id" /></label>
        <label class="label">会话 room_id（可留空导出当前机器人全部会话）<input id="exportRoomId" placeholder="room_id" /></label>
        <div class="grid-two">
          <label class="label">开始时间戳 start_timestamp<input id="exportStartTimestamp" type="number" placeholder="可选" /></label>
          <label class="label">结束时间戳 end_timestamp<input id="exportEndTimestamp" type="number" placeholder="可选" /></label>
        </div>
        <div class="hint">导出包为 JSON，文件名以 chat-audit-export 开头。</div>
      </div>
      <div class="modal-footer">
        <button class="btn" data-close-modal="exportModal">取消</button>
        <button id="downloadExportButton" class="btn primary">下载 JSON</button>
      </div>
    </div>
  </div>

  <div id="imagePreviewModal" class="modal-backdrop image-preview-backdrop">
    <div class="image-preview">
      <button class="btn image-preview-close" data-close-modal="imagePreviewModal">关闭</button>
      <img id="imagePreviewImg" alt="" />
      <div id="imagePreviewCaption" class="image-preview-caption"></div>
    </div>
  </div>

  <script>
    const state = {
      accountList: [],
      adapterList: [],
      currentRobot: null,
      roomList: [],
      currentRoom: null,
      messageList: [],
      searchResults: [],
      searchMode: false,
      loadingRooms: false,
      loadingHistory: false,
      settingsMode: false,
      editingAdapterId: null,
      importValidationReport: null,
      adminApiToken: localStorage.getItem('chatAuditAdminApiToken') || '',
    };

    const el = (id) => document.getElementById(id);
    const text = (value) => value === null || value === undefined ? '' : String(value);

    const promptForAdminApiToken = () => {
      const token = window.prompt('请输入管理 API Token');
      if (token && token.trim()) {
        state.adminApiToken = token.trim();
        localStorage.setItem('chatAuditAdminApiToken', state.adminApiToken);
        return true;
      }
      return false;
    };

    const authHeaders = (headers = {}) => {
      if (!state.adminApiToken) return headers;
      return { ...headers, Authorization: `Bearer ${state.adminApiToken}` };
    };

    const responseErrorMessage = async (response, url) => {
      let detail = '';
      try {
        const payload = await response.clone().json();
        detail = payload && (payload.detail || payload.message || payload.error || JSON.stringify(payload));
      } catch {
        try {
          detail = await response.text();
        } catch {
          detail = '';
        }
      }
      return detail ? `HTTP ${response.status}: ${detail}` : `HTTP ${response.status}: ${url}`;
    };

    const requestJson = async (url, options = {}) => {
      const withAuth = {
        ...options,
        headers: authHeaders(options.headers || {}),
      };
      let response = await fetch(url, withAuth);
      if (response.status === 401 && promptForAdminApiToken()) {
        response = await fetch(url, { ...options, headers: authHeaders(options.headers || {}) });
      }
      if (!response.ok) throw new Error(await responseErrorMessage(response, url));
      if (response.status === 204) return null;
      return await response.json();
    };

    const apiGet = (url) => requestJson(url);
    const apiSend = (url, method, body = null) => requestJson(url, {
      method,
      headers: body !== null ? { 'Content-Type': 'application/json' } : {},
      body: body !== null ? JSON.stringify(body) : null,
    });

    const statusDotClass = (status) => `status-dot status-${['green', 'red', 'gray'].includes(status) ? status : 'gray'}`;
    const formatTs = (ts) => ts ? new Date(ts * 1000).toLocaleString() : '-';
    const avatarText = (id) => {
      const value = text(id).trim();
      return value ? value.slice(-2).toUpperCase() : '--';
    };
    const isNumericId = (id) => /^\d+$/.test(text(id).trim());
    const qqUserAvatarUrl = (id) => {
      const value = text(id).trim();
      return isNumericId(value) ? `https://q1.qlogo.cn/g?b=qq&nk=${encodeURIComponent(value)}&s=100` : '';
    };
    const qqGroupAvatarUrl = (id) => {
      const value = text(id).trim();
      return isNumericId(value) ? `https://p.qlogo.cn/gh/${encodeURIComponent(value)}/${encodeURIComponent(value)}/100` : '';
    };
    const renderAvatar = (container, id, type = 'user') => {
      clearNode(container);
      container.textContent = avatarText(id);
      const url = type === 'group' ? qqGroupAvatarUrl(id) : qqUserAvatarUrl(id);
      if (!url) return;
      const img = document.createElement('img');
      img.alt = '';
      img.loading = 'lazy';
      img.decoding = 'async';
      img.referrerPolicy = 'no-referrer';
      img.addEventListener('error', () => img.remove(), { once: true });
      img.src = url;
      container.appendChild(img);
    };
    const isMedia = (value) => typeof value === 'string' && value.includes('/static/storage/');
    const isImg = (value) => /\.(png|jpe?g|gif|webp|bmp)$/i.test(value);
    const isVideo = (value) => /\.(mp4|webm|mov|mkv)$/i.test(value);
    const isVoice = (value) => /\.(mp3|wav|ogg|silk|amr|m4a)$/i.test(value);
    const decodeHtmlEntities = (value) => {
      const textarea = document.createElement('textarea');
      textarea.innerHTML = value;
      return textarea.value;
    };

    const clearNode = (node) => {
      while (node.firstChild) node.removeChild(node.firstChild);
    };

    const button = (label, className, onClick) => {
      const node = document.createElement('button');
      node.className = className;
      node.type = 'button';
      node.textContent = label;
      node.addEventListener('click', onClick);
      return node;
    };

    const renderAccounts = () => {
      const container = el('accountList');
      clearNode(container);
      state.accountList.forEach((acc) => {
        const node = document.createElement('button');
        node.className = `avatar-button${state.currentRobot && state.currentRobot.id === acc.id ? ' active' : ''}`;
        node.title = `${acc.display_name || acc.id} · ${acc.platform} · ${acc.status}`;
        node.type = 'button';
        node.addEventListener('click', () => switchAccount(acc));

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        renderAvatar(avatar, acc.id);
        node.appendChild(avatar);

        const dot = document.createElement('span');
        dot.className = statusDotClass(acc.status);
        node.appendChild(dot);
        container.appendChild(node);
      });
      el('accountCount').textContent = state.accountList.length;
    };

    const renderAdapters = () => {
      const container = el('adapterList');
      clearNode(container);
      state.adapterList.forEach((acc) => {
        const row = document.createElement('div');
        row.className = 'adapter-item';
        const binding = acc.current_robot_id ? ` -> ${acc.current_robot_id}` : '';
        const edit = button(`${acc.id}${binding} · ${acc.platform} · ${acc.status}`, 'btn link truncate', () => editAdapter(acc));
        const remove = button('删除', 'btn link danger', () => deleteAdapter(acc.id));
        row.append(edit, remove);
        container.appendChild(row);
      });
    };

    const renderRooms = () => {
      const container = el('roomList');
      clearNode(container);
      if (state.loadingRooms) {
        container.appendChild(Object.assign(document.createElement('div'), { className: 'loading', textContent: '正在加载会话...' }));
        return;
      }
      if (state.roomList.length === 0) {
        container.appendChild(Object.assign(document.createElement('div'), { className: 'empty', textContent: '暂无可见会话' }));
        return;
      }
      state.roomList.forEach((room) => {
        const row = document.createElement('button');
        row.className = `room-item${state.currentRoom && state.currentRoom.room_id === room.room_id ? ' active' : ''}`;
        row.type = 'button';
        row.addEventListener('click', () => selectRoom(room));

        const thumb = document.createElement('div');
        thumb.className = 'room-thumb';
        const avatar = document.createElement('div');
        avatar.className = 'room-avatar';
        renderAvatar(avatar, room.room_id, 'group');
        thumb.appendChild(avatar);

        const body = document.createElement('div');
        body.style.minWidth = '0';
        body.style.flex = '1';
        const name = document.createElement('div');
        name.className = 'truncate';
        name.textContent = room.room_id;
        const meta = document.createElement('div');
        meta.className = 'hint truncate';
        meta.textContent = `最近存盘: ${formatTs(room.last_timestamp)}`;
        body.append(name, meta);
        row.append(thumb, body);
        container.appendChild(row);
      });
    };

    const renderSearchResults = () => {
      const panel = el('searchPanel');
      panel.classList.toggle('open', state.searchMode);
      el('searchResultCount').textContent = state.searchResults.length;
      const container = el('searchResults');
      clearNode(container);
      if (!state.searchMode) return;
      if (state.searchResults.length === 0) {
        container.appendChild(Object.assign(document.createElement('div'), { className: 'empty', textContent: '没有匹配消息' }));
        return;
      }
      state.searchResults.forEach((result) => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'result-item';
        item.addEventListener('click', () => selectSearchResult(result));
        const meta = document.createElement('div');
        meta.className = 'result-meta';
        meta.innerHTML = `<span></span><span></span>`;
        meta.children[0].textContent = `${result.room_id} · ${result.nickname || result.sender_id}`;
        meta.children[1].textContent = formatTs(result.timestamp);
        const body = document.createElement('div');
        body.className = 'truncate';
        body.textContent = result.local_message;
        item.append(meta, body);
        container.appendChild(item);
      });
    };

    const renderSettings = () => {
      el('settingsPanel').classList.toggle('open', state.settingsMode);
      el('adapterId').disabled = Boolean(state.editingAdapterId);
      el('saveAdapterButton').textContent = state.editingAdapterId ? '保存修改' : '添加账号';
      renderAdapters();
    };

    const renderChat = () => {
      el('roomTitle').textContent = state.currentRoom ? state.currentRoom.room_id : '请选择会话';
      el('robotView').textContent = state.currentRobot ? ` 视角: ${state.currentRobot.display_name || state.currentRobot.id}` : '';
      el('refreshButton').disabled = !state.currentRoom;
      el('openExportButton').disabled = !state.currentRobot;
      el('chatEmpty').hidden = Boolean(state.currentRoom);
      el('chatWindow').hidden = !state.currentRoom;
      const chat = el('chatWindow');
      clearNode(chat);
      if (!state.currentRoom) return;
      if (state.loadingHistory) {
        const loading = document.createElement('div');
        loading.className = 'hint';
        loading.style.textAlign = 'center';
        loading.textContent = '正在加载更早记录...';
        chat.appendChild(loading);
      }
      if (state.messageList.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.style.textAlign = 'center';
        empty.textContent = '暂无消息';
        chat.appendChild(empty);
        return;
      }
      state.messageList.forEach((msg) => {
        const mine = state.currentRobot && msg.sender_id === state.currentRobot.id;
        const row = document.createElement('div');
        row.className = `message${mine ? ' mine' : ''}`;
        const avatar = document.createElement('div');
        avatar.className = 'avatar message-avatar';
        renderAvatar(avatar, msg.sender_id);
        const body = document.createElement('div');
        body.className = 'message-body';
        const meta = document.createElement('div');
        meta.className = 'message-meta';
        meta.textContent = `${msg.nickname || msg.sender_id} · ${formatTs(msg.timestamp)}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        renderMessageContent(bubble, msg.local_message);
        body.append(meta, bubble);
        row.append(avatar, body);
        chat.appendChild(row);
      });
    };

    const renderMessageContent = (container, value) => {
      clearNode(container);
      if (renderCQParts(container, value)) return;
      const cqImage = parseCQSegment(value, 'image');
      if (cqImage && cqImage.url) {
        renderImageLink(container, cqImage.url, cqImage.file || '媒体图片');
        return;
      }
      const cqJson = parseCQSegment(value, 'json');
      if (cqJson && cqJson.data) {
        renderCQJsonCard(container, cqJson.data);
        return;
      }
      if (renderLocalMediaParts(container, value)) return;
      if (!isMedia(value)) {
        container.textContent = value;
        return;
      }
      if (isImg(value)) {
        renderImageLink(container, value, '媒体图片');
        return;
        const img = document.createElement('img');
        img.className = 'media-img';
        img.src = value;
        img.alt = '媒体图片';
        container.appendChild(img);
        return;
      }
      if (isVideo(value)) {
        const video = document.createElement('video');
        video.className = 'media-video';
        video.src = value;
        video.controls = true;
        container.appendChild(video);
        return;
      }
      if (isVoice(value)) {
        const audio = document.createElement('audio');
        audio.src = value;
        audio.controls = true;
        container.appendChild(audio);
        return;
      }
      const link = document.createElement('a');
      link.href = value;
      link.target = '_blank';
      link.rel = 'noreferrer';
      link.textContent = '打开媒体资产';
      container.appendChild(link);
    };

    const parseCQParams = (paramsText) => {
      const params = {};
      paramsText.split(',').forEach((item) => {
        const index = item.indexOf('=');
        if (index <= 0) return;
        const key = item.slice(0, index);
        const raw = item.slice(index + 1);
        try {
          params[key] = decodeURIComponent(decodeHtmlEntities(raw));
        } catch {
          params[key] = decodeHtmlEntities(raw);
        }
      });
      return params;
    };

    const renderLocalMediaParts = (container, value) => {
      if (typeof value !== 'string' || !value.includes('/static/storage/')) return false;
      const pattern = /\/static\/storage\/[a-f0-9]{32}\.[a-z0-9]+/ig;
      let cursor = 0;
      let matched = false;
      const wrapper = document.createElement('div');
      wrapper.className = 'cq-parts';
      let match = null;
      while ((match = pattern.exec(value)) !== null) {
        matched = true;
        const before = value.slice(cursor, match.index);
        if (before.trim()) {
          const span = document.createElement('span');
          span.className = 'cq-text';
          span.textContent = before;
          wrapper.appendChild(span);
        }
        renderLocalMediaAsset(wrapper, match[0]);
        cursor = pattern.lastIndex;
      }
      const tail = value.slice(cursor);
      if (tail.trim()) {
        const span = document.createElement('span');
        span.className = 'cq-text';
        span.textContent = tail;
        wrapper.appendChild(span);
      }
      if (!matched) return false;
      container.appendChild(wrapper);
      return true;
    };

    const renderLocalMediaAsset = (container, path) => {
      if (isImg(path)) {
        renderImageLink(container, path, '媒体图片');
      } else if (isVideo(path)) {
        const video = document.createElement('video');
        video.className = 'media-video';
        video.src = path;
        video.controls = true;
        container.appendChild(video);
      } else if (isVoice(path)) {
        const audio = document.createElement('audio');
        audio.src = path;
        audio.controls = true;
        container.appendChild(audio);
      } else {
        const link = document.createElement('a');
        link.href = path;
        link.target = '_blank';
        link.rel = 'noreferrer';
        link.textContent = '打开媒体资产';
        container.appendChild(link);
      }
    };

    const renderCQParts = (container, value) => {
      if (typeof value !== 'string' || !value.includes('[CQ:')) return false;
      const pattern = /\[CQ:(\w+),([\s\S]*?)\]/g;
      let cursor = 0;
      let matched = false;
      const wrapper = document.createElement('div');
      wrapper.className = 'cq-parts';

      const appendText = (textValue) => {
        if (!textValue) return;
        const span = document.createElement('span');
        span.className = 'cq-text';
        span.textContent = textValue;
        wrapper.appendChild(span);
      };

      let match = null;
      while ((match = pattern.exec(value)) !== null) {
        matched = true;
        appendText(value.slice(cursor, match.index));
        const kind = match[1];
        const params = parseCQParams(match[2]);
        if (kind === 'image' && params.url) {
          renderImageLink(wrapper, params.url, params.summary || params.file || '媒体图片');
        } else if (kind === 'json' && params.data) {
          renderCQJsonCard(wrapper, params.data);
        } else if (kind === 'at') {
          renderCQChip(wrapper, `@${params.qq || 'unknown'}`);
        } else if (kind === 'reply') {
          renderReplyCard(wrapper, params);
          cursor = pattern.lastIndex;
          continue;
        } else if (kind === 'forward') {
          renderForwardCard(wrapper, params);
        } else {
          renderCQChip(wrapper, `[${kind}]`);
        }
        cursor = pattern.lastIndex;
      }
      appendText(value.slice(cursor));
      if (!matched) return false;
      container.appendChild(wrapper);
      return true;
    };

    const renderImageLink = (container, src, alt) => {
      const cleanSrc = decodeHtmlEntities(String(src || ''));
      const preview = document.createElement('button');
      preview.className = 'media-image-button';
      preview.type = 'button';
      preview.title = '预览图片';
      preview.addEventListener('click', () => openImagePreview(cleanSrc, alt));
      const img = document.createElement('img');
      img.className = 'media-img';
      img.src = cleanSrc;
      img.referrerPolicy = 'no-referrer';
      img.alt = alt;
      preview.appendChild(img);
      container.appendChild(preview);
    };

    const renderCQChip = (container, label) => {
      const chip = document.createElement('span');
      chip.className = 'cq-chip';
      chip.textContent = label;
      container.appendChild(chip);
    };

    const renderReplyCard = (container, params) => {
      const card = document.createElement('div');
      card.className = 'reply-card';
      card.textContent = params.id ? `回复消息 #${params.id}` : '回复消息';
      container.appendChild(card);
    };

    const renderForwardCard = (container, params) => {
      const card = document.createElement('div');
      card.className = 'forward-card';
      const action = button(`合并转发消息 ${params.id || ''}`, 'btn link', async () => {
        await toggleForwardDetail(params.id, detail);
      });
      const detail = document.createElement('div');
      detail.className = 'forward-detail';
      detail.hidden = true;
      card.append(action, detail);
      container.appendChild(card);
    };

    const toggleForwardDetail = async (forwardId, detail) => {
      if (!forwardId || !state.currentRobot) return;
      if (detail.dataset.loaded === 'true') {
        detail.hidden = !detail.hidden;
        return;
      }
      detail.hidden = false;
      detail.textContent = '正在加载合并消息...';
      try {
        const payload = await apiGet(`/api/forward?robot_id=${encodeURIComponent(state.currentRobot.id)}&forward_id=${encodeURIComponent(forwardId)}`);
        renderForwardPayload(detail, payload);
        detail.dataset.loaded = 'true';
      } catch (error) {
        detail.textContent = `加载失败：${error.message}`;
      }
    };

    const renderForwardPayload = (container, payload) => {
      clearNode(container);
      const data = payload && payload.data ? payload.data : payload;
      const messages = Array.isArray(data) ? data : (data && (data.messages || data.message)) || [];
      if (!Array.isArray(messages) || messages.length === 0) {
        container.textContent = '没有可显示的合并消息内容';
        return;
      }
      messages.forEach((item) => {
        const row = document.createElement('div');
        row.className = 'forward-message';
        const meta = document.createElement('div');
        meta.className = 'forward-meta';
        const sender = item.sender && (item.sender.nickname || item.sender.card || item.sender.user_id);
        meta.textContent = sender ? String(sender) : 'forward';
        const body = document.createElement('div');
        const content = item.raw_message || item.message || item.content || '';
        renderOneBotContent(body, content);
        row.append(meta, body);
        container.appendChild(row);
      });
    };

    const renderOneBotContent = (container, content) => {
      clearNode(container);
      if (Array.isArray(content)) {
        const wrapper = document.createElement('div');
        wrapper.className = 'cq-parts';
        content.forEach((segment) => renderOneBotSegment(wrapper, segment));
        container.appendChild(wrapper);
        return;
      }
      if (content && typeof content === 'object') {
        renderOneBotSegment(container, content);
        return;
      }
      renderMessageContent(container, String(content || ''));
    };

    const renderOneBotSegment = (container, segment) => {
      if (!segment || typeof segment !== 'object') {
        const span = document.createElement('span');
        span.className = 'cq-text';
        span.textContent = String(segment || '');
        container.appendChild(span);
        return;
      }
      const type = segment.type || segment.kind || '';
      const data = segment.data || segment;
      if (type === 'text') {
        const span = document.createElement('span');
        span.className = 'cq-text';
        span.textContent = data.text || '';
        container.appendChild(span);
      } else if (type === 'image') {
        const src = data.url || data.path || data.file;
        if (src) {
          renderImageLink(container, src, data.summary || data.file || '媒体图片');
        } else {
          renderCQChip(container, '[图片]');
        }
      } else if (type === 'at') {
        renderCQChip(container, `@${data.qq || 'unknown'}`);
      } else if (type === 'reply') {
        renderReplyCard(container, data);
      } else if (type === 'json') {
        renderCQJsonCard(container, data.data || '{}');
      } else if (type === 'forward') {
        renderForwardCard(container, data);
      } else if (data.text) {
        const span = document.createElement('span');
        span.className = 'cq-text';
        span.textContent = data.text;
        container.appendChild(span);
      } else if (data.url || data.file) {
        renderImageLink(container, data.url || data.file, data.summary || data.file || '媒体');
      } else {
        renderCQChip(container, `[${type || '消息'}]`);
      }
    };

    const parseCQSegment = (value, kind) => {
      if (typeof value !== 'string') return null;
      const match = value.trim().match(new RegExp(`^\\[CQ:${kind},([\\s\\S]*)\\]$`));
      if (!match) return null;
      return parseCQParams(match[1]);
    };

    const renderCQJsonCard = (container, data) => {
      let payload = null;
      try {
        payload = JSON.parse(data);
      } catch {
        container.textContent = data;
        return;
      }
      const detail = payload.meta && (payload.meta.detail_1 || Object.values(payload.meta)[0]);
      const title = detail && detail.title ? detail.title : payload.prompt || payload.app || 'JSON 卡片';
      const desc = detail && detail.desc ? detail.desc : payload.prompt || '';
      const url = detail && (detail.qqdocurl || detail.url);
      const preview = detail && (detail.preview || detail.icon);

      const card = document.createElement('div');
      card.className = 'json-card';
      if (preview) {
        const img = document.createElement('img');
        img.className = 'json-card-img';
        img.src = preview.startsWith('http') ? preview : `https://${preview}`;
        img.alt = title;
        card.appendChild(img);
      }
      const body = document.createElement('div');
      body.className = 'json-card-body';
      const heading = document.createElement(url ? 'a' : 'div');
      heading.className = 'json-card-title';
      heading.textContent = title;
      if (url) {
        heading.href = url.startsWith('http') ? url : `https://${url}`;
        heading.target = '_blank';
        heading.rel = 'noreferrer';
      }
      const summary = document.createElement('div');
      summary.className = 'json-card-desc';
      summary.textContent = desc;
      body.append(heading, summary);
      card.appendChild(body);
      container.appendChild(card);
    };

    const renderAll = () => {
      renderAccounts();
      renderSettings();
      renderSearchResults();
      renderRooms();
      renderChat();
    };

    const loadAdapters = async () => {
      const [bots, adapters] = await Promise.all([apiGet('/api/bots'), apiGet('/api/adapters')]);
      state.accountList = bots;
      state.adapterList = adapters;
      if (state.accountList.length > 0 && !state.currentRobot) {
        await switchAccount(state.accountList[0]);
      } else {
        renderAll();
      }
    };

    async function switchAccount(acc) {
      state.currentRobot = acc;
      state.currentRoom = null;
      state.messageList = [];
      clearSearch();
      state.loadingRooms = true;
      renderAll();
      try {
        state.roomList = await apiGet(`/api/rooms?robot_id=${encodeURIComponent(acc.id)}`);
      } finally {
        state.loadingRooms = false;
        renderAll();
      }
    }

    const resetAdapterForm = () => {
      state.editingAdapterId = null;
      el('adapterId').value = '';
      el('adapterPlatform').value = 'qq';
      el('adapterStatus').value = 'gray';
      el('adapterConfig').value = '';
      renderSettings();
    };

    const editAdapter = (adapter) => {
      state.editingAdapterId = adapter.id;
      el('adapterId').value = adapter.id;
      el('adapterPlatform').value = adapter.platform;
      el('adapterStatus').value = adapter.status;
      el('adapterConfig').value = adapter.config_json || '';
      renderSettings();
    };

    const saveAdapter = async () => {
      const payload = {
        platform: el('adapterPlatform').value,
        status: el('adapterStatus').value,
        config_json: el('adapterConfig').value ? el('adapterConfig').value : null,
      };
      if (!el('adapterId').value || !payload.platform) return;
      if (state.editingAdapterId) {
        await apiSend(`/api/adapters/${encodeURIComponent(state.editingAdapterId)}`, 'PATCH', payload);
      } else {
        await apiSend('/api/adapters', 'POST', { id: el('adapterId').value, ...payload });
      }
      resetAdapterForm();
      await loadAdapters();
    };

    const deleteAdapter = async (adapterId) => {
      await apiSend(`/api/adapters/${encodeURIComponent(adapterId)}`, 'DELETE');
      await loadAdapters();
    };

    async function selectRoom(room) {
      state.currentRoom = room;
      state.messageList = [];
      renderAll();
      await reloadCurrentRoom();
    }

    async function selectSearchResult(result) {
      let room = state.roomList.find((item) => item.room_id === result.room_id);
      if (!room) {
        room = { room_id: result.room_id, last_timestamp: result.timestamp };
        state.roomList = [room, ...state.roomList];
      }
      state.currentRoom = room;
      state.messageList = [result];
      renderAll();
      scrollChatToBottom();
    }

    async function performSearch() {
      const keyword = el('searchInput').value.trim();
      if (!state.currentRobot || !keyword) return;
      state.searchMode = true;
      state.searchResults = await apiGet(`/api/search?robot_id=${encodeURIComponent(state.currentRobot.id)}&keyword=${encodeURIComponent(keyword)}&limit=50`);
      renderAll();
    }

    function clearSearch() {
      state.searchMode = false;
      state.searchResults = [];
      renderAll();
    }

    const loadMessages = async (beforeTimestamp = null) => {
      if (!state.currentRobot || !state.currentRoom) return [];
      let url = `/api/messages?robot_id=${encodeURIComponent(state.currentRobot.id)}&room_id=${encodeURIComponent(state.currentRoom.room_id)}&limit=50`;
      if (beforeTimestamp !== null && beforeTimestamp !== undefined) url += `&before_timestamp=${encodeURIComponent(beforeTimestamp)}`;
      return await apiGet(url);
    };

    async function reloadCurrentRoom() {
      if (!state.currentRoom) return;
      state.messageList = await loadMessages();
      renderAll();
      scrollChatToBottom();
    }

    const scrollChatToBottom = () => {
      const chat = el('chatWindow');
      chat.scrollTop = chat.scrollHeight;
    };

    async function handleWindowScroll() {
      const chat = el('chatWindow');
      if (!chat || chat.scrollTop !== 0 || state.loadingHistory || state.messageList.length === 0) return;
      state.loadingHistory = true;
      const oldScrollHeight = chat.scrollHeight;
      const cursorTimestamp = state.messageList[0].timestamp;
      renderChat();
      try {
        const older = await loadMessages(cursorTimestamp);
        if (older.length > 0) {
          state.messageList = [...older, ...state.messageList];
          renderChat();
          chat.scrollTop = chat.scrollHeight - oldScrollHeight;
        }
      } finally {
        state.loadingHistory = false;
        renderChat();
      }
    }

    const openExportDialog = () => {
      el('exportRobotId').value = state.currentRobot ? state.currentRobot.id : '';
      el('exportRoomId').value = state.currentRoom ? state.currentRoom.room_id : '';
      el('exportStartTimestamp').value = '';
      el('exportEndTimestamp').value = '';
      openModal('exportModal');
    };

    async function downloadExportPackage() {
      if (!el('exportRobotId').value.trim()) return;
      const params = new URLSearchParams();
      [
        ['robot_id', el('exportRobotId').value],
        ['room_id', el('exportRoomId').value],
        ['start_timestamp', el('exportStartTimestamp').value],
        ['end_timestamp', el('exportEndTimestamp').value],
      ].forEach(([key, value]) => {
        if (text(value).trim()) params.append(key, text(value).trim());
      });
      const packageJson = await requestJson(`/api/export?${params.toString()}`);
      const blob = new Blob([JSON.stringify(packageJson, null, 2)], { type: 'application/json;charset=utf-8' });
      const link = document.createElement('a');
      const objectUrl = URL.createObjectURL(blob);
      link.href = objectUrl;
      link.download = `chat-audit-export-${Date.now()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(objectUrl);
      closeModal('exportModal');
    }

    const openImportDialog = () => {
      el('importPackageText').value = '';
      state.importValidationReport = null;
      renderImportReport();
      openModal('importModal');
    };

    const parseImportPackage = () => JSON.parse(el('importPackageText').value);

    async function validateImportPackage() {
      if (!el('importPackageText').value.trim()) return;
      state.importValidationReport = await apiSend('/api/import/validate', 'POST', parseImportPackage());
      renderImportReport();
    }

    async function submitImportPackage() {
      if (!state.importValidationReport || !state.importValidationReport.valid) return;
      await apiSend('/api/import', 'POST', parseImportPackage());
      closeModal('importModal');
      if (state.currentRobot) await switchAccount(state.currentRobot);
    }

    const renderImportReport = () => {
      const box = el('importValidationReport');
      clearNode(box);
      const report = state.importValidationReport;
      box.hidden = !report;
      if (!report) return;
      const rows = [
        ['校验结果', report.valid ? '通过' : '失败', report.valid ? 'ok' : 'bad'],
        ['schema', report.schema || '-'],
        ['checksum', report.checksum_valid === null ? '未提供' : (report.checksum_valid ? '通过' : '失败')],
        ['counts', `messages=${report.counts.messages} / robot_messages=${report.counts.robot_messages} / media_assets=${report.counts.media_assets} / media_files=${report.counts.media_files || 0}`],
      ];
      if (report.diff && report.diff.messages) {
        rows.push(['diff.messages 新增/更新/不变', `${report.diff.messages.new} / ${report.diff.messages.update} / ${report.diff.messages.unchanged}`]);
      }
      if (report.diff && report.diff.robot_messages) {
        rows.push(['diff.robot_messages 新增/已存在', `${report.diff.robot_messages.new} / ${report.diff.robot_messages.existing}`]);
      }
      if (report.diff && report.diff.media_assets) {
        rows.push(['diff.media_assets 新增/更新/不变', `${report.diff.media_assets.new} / ${report.diff.media_assets.update} / ${report.diff.media_assets.unchanged}`]);
      }
      if (report.media_files) {
        rows.push(['媒体文件 media_files checked/missing/mismatch', `${report.media_files.checked} / ${report.media_files.missing} / ${report.media_files.mismatch}`]);
      }
      if (report.errors && report.errors.length) rows.push(['errors', report.errors.join('; '), 'bad']);
      rows.forEach(([name, value, className]) => {
        const row = document.createElement('div');
        const label = document.createElement('strong');
        label.textContent = `${name}：`;
        const valueNode = document.createElement('span');
        if (className) valueNode.className = className;
        valueNode.textContent = value;
        row.append(label, valueNode);
        box.appendChild(row);
      });
    };

    const openModal = (id) => el(id).classList.add('open');
    const closeModal = (id) => {
      el(id).classList.remove('open');
      if (id === 'imagePreviewModal') {
        el('imagePreviewImg').removeAttribute('src');
        el('imagePreviewCaption').textContent = '';
      }
    };

    const openImagePreview = (src, alt) => {
      el('imagePreviewImg').src = src;
      el('imagePreviewImg').alt = alt || '';
      el('imagePreviewCaption').textContent = alt || src;
      openModal('imagePreviewModal');
    };

    const bindEvents = () => {
      el('settingsToggle').addEventListener('click', () => { state.settingsMode = !state.settingsMode; renderSettings(); });
      el('newAdapterButton').addEventListener('click', resetAdapterForm);
      el('clearAdapterButton').addEventListener('click', resetAdapterForm);
      el('saveAdapterButton').addEventListener('click', saveAdapter);
      el('searchButton').addEventListener('click', performSearch);
      el('searchInput').addEventListener('keydown', (event) => { if (event.key === 'Enter') performSearch(); });
      el('clearSearchButton').addEventListener('click', clearSearch);
      el('refreshButton').addEventListener('click', reloadCurrentRoom);
      el('chatWindow').addEventListener('scroll', handleWindowScroll);
      el('openExportButton').addEventListener('click', openExportDialog);
      el('downloadExportButton').addEventListener('click', downloadExportPackage);
      el('openImportButton').addEventListener('click', openImportDialog);
      el('validateImportButton').addEventListener('click', validateImportPackage);
      el('submitImportButton').addEventListener('click', submitImportPackage);
      document.querySelectorAll('[data-close-modal]').forEach((node) => {
        node.addEventListener('click', () => closeModal(node.dataset.closeModal));
      });
      document.querySelectorAll('.modal-backdrop').forEach((node) => {
        node.addEventListener('click', (event) => {
          if (event.target === node) closeModal(node.id);
        });
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          document.querySelectorAll('.modal-backdrop.open').forEach((node) => closeModal(node.id));
        }
      });
    };

    window.performSearch = performSearch;
    window.selectSearchResult = selectSearchResult;
    window.openExportDialog = openExportDialog;
    window.downloadExportPackage = downloadExportPackage;
    window.openImportDialog = openImportDialog;
    window.validateImportPackage = validateImportPackage;
    window.submitImportPackage = submitImportPackage;

    bindEvents();
    renderAll();
    loadAdapters().catch((error) => {
      console.error(error);
      el('roomList').appendChild(Object.assign(document.createElement('div'), { className: 'empty', textContent: '控制台加载失败，请检查 API 或管理 Token。' }));
    });
  </script>
</body>
</html>
