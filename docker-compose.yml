services:
  postgres:
    image: postgres:16-alpine
    container_name: chat-audit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-audit-core
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: chat-audit-core
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      STORAGE_ROOT: /app/data/storage
      BACKUP_ROOT: /app/data/backups
      PUBLIC_STORAGE_PREFIX: /static/storage
      ONEBOT_WS_PATH: /onebot/v11/ws
      ONEBOT_ACCESS_TOKEN: ${ONEBOT_ACCESS_TOKEN}
      MEDIA_DOWNLOAD_TIMEOUT_SECONDS: 30
      MEDIA_MAX_BYTES: 104857600
      FFMPEG_BIN: ffmpeg
      AUTO_BACKUP_CRON: 0 3 * * *
      AUTO_BACKUP_KEEP_LATEST: 7
    ports:
      - "8000:8000"
    volumes:
      - ./data/storage:/app/data/storage
      - ./data/backups:/app/data/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; print(json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
