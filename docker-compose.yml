services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-audit-core
    restart: unless-stopped
    environment:
      APP_NAME: chat-audit-core
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SYSTEM_INSTANCE_ID: ${SYSTEM_INSTANCE_ID}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      ADMIN_API_TOKENS: ${ADMIN_API_TOKENS:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:////app/data/chat_audit.sqlite3}
      STORAGE_ROOT: /app/data/storage
      BACKUP_ROOT: /app/data/backups
      PUBLIC_STORAGE_PREFIX: /static/storage
      ONEBOT_WS_PATH: /onebot/v11/ws
      ONEBOT_ACCESS_TOKEN: ${ONEBOT_ACCESS_TOKEN}
      MEDIA_DOWNLOAD_TIMEOUT_SECONDS: 30
      MEDIA_MAX_BYTES: 104857600
      FFMPEG_BIN: ffmpeg
      FFMPEG_LIBRARY_PATH: ${FFMPEG_LIBRARY_PATH:-}
      MEDIA_TRANSCODE_ENABLED: ${MEDIA_TRANSCODE_ENABLED:-false}
      MEDIA_TRANSCODE_VOICE_EXT: mp3
      MEDIA_TRANSCODE_VIDEO_EXT: mp4
      AUTO_BACKUP_CRON: 0 3 * * *
      AUTO_BACKUP_KEEP_LATEST: 7
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    networks:
      - default
      - qqbot_astrbot_network
    healthcheck:
      test: ["CMD", "python", "-c", "import json, sys, urllib.request; r = json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)); sys.exit(0 if r.get('status') == 'ok' else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  qqbot_astrbot_network:
    external: true
