name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db && psql -U test_user -d test_db -c 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
      APP_SECRET_KEY: ci-secret
      ONEBOT_ACCESS_TOKEN: ci-onebot-token
      ADMIN_API_TOKEN: ci-admin-token
      SYSTEM_INSTANCE_ID: chat-audit-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify minified frontend assets
        run: |
          python scripts/minify_static_assets.py
          git diff --exit-code app/static/assets/app.min.css app/static/assets/app.min.js

      - name: Compile Python modules
        run: python -m compileall app tests

      - name: Run tests
        run: python -m pytest tests -q

      - name: Build Docker image
        run: docker build -t chat-audit-core:ci .
